name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Go private modules
        run: git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPRIVATE: github.com/GoCodeAlone/*
          GONOSUMCHECK: github.com/GoCodeAlone/*
      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASES_TOKEN || github.token }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            if (release.draft) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                draft: false,
              });
            }

  notify-workflow-registry:
    name: Notify workflow-registry
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-') }}
    steps:
      - name: Trigger registry manifest sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.repo_dispatch_token }}
          repository: GoCodeAlone/workflow-registry
          event-type: plugin-release
          client-payload: '{"plugin": "turnio"}'
